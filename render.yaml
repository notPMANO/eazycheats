# Render Blueprint — deploys EazyCheats as a Node web service with a
# persistent disk for the SQLite database + uploads.
# In Render: New → Blueprint → connect this repo. Then fill in the
# SESSION_SECRET and SMTP_PASS values in the dashboard.
services:
  - type: web
    name: eazycheats
    runtime: node
    plan: starter            # a paid plan is required for a persistent disk
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    disk:
      name: eazycheats-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_EMAIL
        value: phoenix@edis.org
      - key: APP_URL
        value: https://eazycheats.com
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: resend
      - key: MAIL_FROM
        value: EazyCheats <no-reply@eazycheats.com>
      # Secrets — set these in the Render dashboard, not here:
      - key: SESSION_SECRET
        sync: false
      - key: SMTP_PASS
        sync: false
